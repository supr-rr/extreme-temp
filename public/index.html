<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>usa current weather extremes</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
      text-transform: lowercase;
    }

    .meta {
      margin-bottom: 24px;
      color: #bbb;
      line-height: 1.6;
    }

    .wrap {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #1d1d1d;
      border-radius: 14px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
    }

    a {
      color: #8ecbff;
    }
  </style>
</head>
<body>
  <h1>usa current weather extremes</h1>
  <div class="meta" id="meta">loading...</div>

  <div class="wrap">
    <div class="card" id="hottest">loading hottest...</div>
    <div class="card" id="coldest">loading coldest...</div>
    <div class="card" id="windiest">loading max wind gust...</div>
    <div class="card" id="highestPressure">loading max pressure...</div>
    <div class="card" id="lowestPressure">loading min pressure...</div>
  </div>

  <script>
    function fmtTempF(f) {
      if (f == null) return "N/A";
      return `${f.toFixed(1)} °F`;
    }

    function fmtWindMph(mph) {
      if (mph == null) return "N/A";
      return `${mph.toFixed(1)} mph`;
    }

    function fmtPressure(inHg) {
      if (inHg == null) return "N/A";
      return `${inHg.toFixed(2)} inHg`;
    }

    function fmtTime(s) {
      if (!s) return "N/A";

      const d = new Date(s);

      return d.toLocaleString("en-US", {
        timeZone: "UTC",
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }) + " UTC";
    }

    function placeName(item) {
      return item.locationName || item.stationName || item.stationId || "Unknown station";
    }

    function mapLink(item) {
      if (item.latitude == null || item.longitude == null) return "";
      return `<p><a href="https://www.google.com/maps?q=${item.latitude},${item.longitude}" target="_blank">view on map</a></p>`;
    }

    function forecastLink(item) {
      return item.forecast
        ? `<p><a href="${item.forecast}" target="_blank">Forecast</a></p>`
        : "";
    }

    function renderTempCard(title, item) {
      if (!item) {
        return `
          <h2>${title}</h2>
          <p>no data available</p>
        `;
      }

      return `
        <h2>${title}</h2>
        <p><strong>${placeName(item)}</strong></p>
        ${mapLink(item)}
        <p style="color:#bbb;font-size:14px;">station: ${item.stationId}</p>
        <p>${fmtTempF(item.temperatureF)}</p>
        <p>${item.textDescription || ""}</p>
        <p>observed: ${fmtTime(item.timestamp)}</p>
        ${forecastLink(item)}
      `;
    }

    function renderWindCard(title, item) {
      if (!item) {
        return `
          <h2>${title}</h2>
          <p>no data available</p>
        `;
      }

      return `
        <h2>${title}</h2>
        <p><strong>${placeName(item)}</strong></p>
        ${mapLink(item)}
        <p style="color:#bbb;font-size:14px;">station: ${item.stationId}</p>
        <p>${fmtWindMph(item.windGustMph)}</p>
        <p>${item.textDescription || ""}</p>
        <p>observed: ${fmtTime(item.timestamp)}</p>
        ${forecastLink(item)}
      `;
    }

    function renderPressureCard(title, item, value) {
      if (!item) {
        return `
          <h2>${title}</h2>
          <p>no data available</p>
        `;
      }

      return `
        <h2>${title}</h2>
        <p><strong>${placeName(item)}</strong></p>
        ${mapLink(item)}
        <p style="color:#bbb;font-size:14px;">station: ${item.stationId}</p>
        <p>${fmtPressure(value)}</p>
        <p>${item.textDescription || ""}</p>
        <p>observed: ${fmtTime(item.timestamp)}</p>
        ${forecastLink(item)}
      `;
    }

    async function load() {
      try {
        const res = await fetch("/extremes");
        const data = await res.json();

        if (data.loading) {
          document.getElementById("meta").innerHTML = "loading weather scan...";
          document.getElementById("hottest").innerHTML = "loading hottest...";
          document.getElementById("coldest").innerHTML = "loading coldest...";
          document.getElementById("windiest").innerHTML = "loading max wind gust...";
          document.getElementById("highestPressure").innerHTML = "loading max pressure...";
          document.getElementById("lowestPressure").innerHTML = "loading min pressure...";
          return;
        }

        if (data.error) {
          document.getElementById("meta").innerHTML = `Error: ${data.error}`;
          return;
        }

        document.getElementById("meta").innerHTML = `
          scanned stations: ${data.scannedStations}<br>
          valid observations: ${data.validObservations}<br>
          updated: ${fmtTime(data.updatedAt)}<br>
        `;

        document.getElementById("hottest").innerHTML =
          renderTempCard("hottest", data.hottest);

        document.getElementById("coldest").innerHTML =
          renderTempCard("coldest", data.coldest);

        document.getElementById("windiest").innerHTML =
          renderWindCard("max wind gust", data.windiest);

        document.getElementById("highestPressure").innerHTML =
          renderPressureCard(
            "max barometric pressure",
            data.highestPressure,
            data.highestPressure?.barometricPressureInHg
          );

        document.getElementById("lowestPressure").innerHTML =
          renderPressureCard(
            "min barometric pressure",
            data.lowestPressure,
            data.lowestPressure?.barometricPressureInHg
          );
      } catch (error) {
        console.error(error);
        document.body.innerHTML += `<p>Error: ${error.message}</p>`;
      }
    }

    load();
    setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
