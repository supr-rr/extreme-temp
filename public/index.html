<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title> usa current temperature extremes</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
  body {
    font-family: "JetBrains Mono", monospace;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .meta {
      margin-bottom: 24px;
      color: #bbb;
    }

    .wrap {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #1d1d1d;
      border-radius: 14px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
    }

    a {
      color: #8ecbff;
    }
  </style>
</head>
<body>
  <h1>usa current temperature extremes</h1>
  <div class="meta" id="meta">loading...</div>

  <div class="wrap">
    <div class="card" id="hottest">loading hottest...</div>
    <div class="card" id="coldest">loading coldest...</div>
  </div>

  <script>
    function fmtTempF(f) {
      return `${f.toFixed(1)} °F`;
    }

    function fmtTime(s) {
  const d = new Date(s);

  return d.toLocaleString("en-US", {
    timeZone: "UTC",
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  }) + " UTC";
}

    async function load() {
      try {
        const res = await fetch("/extremes");
        const data = await res.json();
if (data.loading) {
  document.getElementById("meta").innerHTML = "loading weather scan...";
  document.getElementById("hottest").innerHTML = "loading hottest...";
  document.getElementById("coldest").innerHTML = "loading coldest...";
  return;
}

if (data.error) {
  document.getElementById("meta").innerHTML = `Error: ${data.error}`;
}

        document.getElementById("meta").innerHTML = `
          scanned stations: ${data.scannedStations}<br>
          valid observations: ${data.validObservations}<br>
          updated: ${fmtTime(data.updatedAt)}<br>
          
        `;

        document.getElementById("hottest").innerHTML = `
  <h2> hottest</h2>
  <p><strong>${data.hottest.locationName || data.hottest.stationName || data.hottest.stationId}</strong></p>
<p><a href="https://www.google.com/maps?q=${data.hottest.latitude},${data.hottest.longitude}" target="_blank">view on map</a></p>
  <p style="color:#bbb;font-size:14px;">station: ${data.hottest.stationId}</p>
  <p>${fmtTempF(data.hottest.temperatureF)}</p>
  <p>${data.hottest.textDescription || ""}</p>
  <p>observed: ${fmtTime(data.hottest.timestamp)}</p>
  ${
    data.hottest.forecast
      ? `<p><a href="${data.hottest.forecast}" target="_blank">Forecast</a></p>`
      : ""
  }
`;

        document.getElementById("coldest").innerHTML = `
  <h2> coldest</h2>
 <p><strong>${data.coldest.locationName || data.coldest.stationName || data.coldest.stationId}</strong></p>
<p><a href="https://www.google.com/maps?q=${data.coldest.latitude},${data.coldest.longitude}" target="_blank">view on map</a></p>
  <p style="color:#bbb;font-size:14px;">station: ${data.coldest.stationId}</p>
  <p>${fmtTempF(data.coldest.temperatureF)}</p>
  <p>${data.coldest.textDescription || ""}</p>
  <p>observed: ${fmtTime(data.coldest.timestamp)}</p>
  ${
    data.coldest.forecast
      ? `<p><a href="${data.coldest.forecast}" target="_blank">Forecast</a></p>`
      : ""
  }
`;
      } catch (error) {
        console.error(error);
        document.body.innerHTML += `<p>Error: ${error.message}</p>`;
      }
    }

    load();
    setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
